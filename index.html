<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kinetik Game Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:Inter,sans-serif;
background:#0a0a0a;
color:white;
overflow-x:hidden;
}

:root{
--orange:#ff6a00;
--line:#1f1f1f;
}

a{
text-decoration:none;
color:inherit;
}

/* NAV */
nav{
position:fixed;
top:0;
left:0;
width:100%;
height:76px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 50px;
background:rgba(10,10,10,.88);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
z-index:1000;
}

.logo{
display:flex;
align-items:center;
gap:14px;
font-weight:900;
font-size:1.05rem;
letter-spacing:2px;
}

.logo img{
height:36px;
}

.links{
display:flex;
gap:30px;
}

.links a{
color:#8a8a8a;
font-weight:600;
transition:.2s;
font-size:.95rem;
}

.links a:hover{
color:white;
}


.hero{
min-height:100vh;
display:flex;
align-items:center;
padding:140px 8% 0;
position:relative;
}

.hero::before{
content:"";
position:absolute;
right:-220px;
top:-220px;
width:600px;
height:600px;
background:radial-gradient(circle,var(--orange),transparent 70%);
opacity:.08;
filter:blur(80px);
}

.hero-content{
max-width:1000px;
}

.hero h1{
font-size:clamp(3.8rem,10vw,9rem);
font-weight:900;
line-height:.9;
letter-spacing:-5px;
}

.hero h1 span{
color:var(--orange);
}

.hero p{
margin-top:26px;
font-size:1.1rem;
color:#9a9a9a;
max-width:650px;
line-height:1.8;
}

.hero-buttons{
margin-top:35px;
display:flex;
gap:14px;
flex-wrap:wrap;
}

.btn{
padding:15px 24px;
font-weight:700;
border-radius:12px;
transition:.2s;
display:inline-flex;
align-items:center;
justify-content:center;
}

.primary{
background:var(--orange);
color:#000;
}

.primary:hover{
transform:translateY(-2px);
}

.secondary{
border:1px solid var(--line);
color:white;
}

.secondary:hover{
border-color:#3a3a3a;
}


footer{
padding:50px 8%;
display:flex;
justify-content:space-between;
align-items:center;
border-top:1px solid var(--line);
flex-wrap:wrap;
gap:20px;
}

footer p{
color:#666;
}


@media(max-width:800px){

nav{
padding:0 22px;
}

.links{
display:none;
}

.hero h1{
letter-spacing:-3px;
font-size:clamp(3rem,12vw,6rem);
}

}

</style>
</head>

<body>

<nav>

<div class="logo">
<img src="https://ik.imagekit.io/l7uslhlci/IMG_4336.png?updatedAt=1781040819005">
<span>KINETIK</span>
</div>

<div class="links">
<a href="https://youtube.com/@kinetikgamestudios">Youtube</a>
<a href="creations.html">Creations</a>
</div>

</nav>

<section class="hero">

<div class="hero-content">

<h1>
KINETIK<br>
<span>STUDIO</span>
</h1>

<p>
A focused creative studio building interactive web experiences.
Clean systems. Sharp visuals. Constant iteration.
</p>

<div class="hero-buttons">

<a href="creations.html" class="btn primary">Creations</a>
<a href="https://youtube.com/@kinetikgamestudios" class="btn secondary">YouTube</a>

</div>

</div>

</section>

<footer>

<div class="logo">
<img src="https://ik.imagekit.io/l7uslhlci/IMG_4336.png?updatedAt=1781040819005">
<span>KINETIK</span>
</div>

<p>© 2026 Kinetik</p>

</footer>

</body>
</html>
